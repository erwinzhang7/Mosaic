name: Mosaic

options:
  bundleIdPrefix: com.erwinzhang
  deploymentTarget:
    macOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.erwinzhang.mosaic
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Mosaic
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Erwin Zhang"
    INFOPLIST_KEY_LSUIElement: YES        # agent app: no Dock icon, summoned via hotkey
    INFOPLIST_KEY_NSPrincipalClass: NSApplication
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: NO                # launcher needs to enumerate & launch apps
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"               # ad-hoc; works for local development
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Mosaic:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_NAME: Mosaic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
